<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parth Library Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
      }

      .card-soft {
        border: 0;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="fa-solid fa-book-open me-2"></i>Parth Library
        </a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" href="index.html">Home</a>
          <a class="btn btn-outline-light btn-sm" href="student.html">Student Portal</a>
        </div>
      </div>
    </nav>

    <div id="login-view" class="min-vh-100 d-flex align-items-center justify-content-center p-4">
      <div class="card card-soft p-4 w-100" style="max-width: 420px;">
        <h2 class="text-center fw-bold mb-3">Owner Access</h2>
        <p class="text-muted text-center">Enter the secure passcode to access the admin dashboard.</p>
        <form id="login-form" class="mt-3">
          <div class="mb-3">
            <label for="passcode" class="form-label">Passcode</label>
            <input type="password" id="passcode" class="form-control" required />
          </div>
          <button type="submit" class="btn btn-primary w-100">Unlock Dashboard</button>
        </form>
        <div id="login-error" class="text-danger mt-3 d-none">Incorrect passcode. Please try again.</div>
      </div>
    </div>

    <div id="dashboard-view" class="d-none">
      <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
          <a class="navbar-brand fw-bold" href="index.html">
            <i class="fa-solid fa-book-open me-2"></i>Parth Library Admin
          </a>
          <button class="btn btn-outline-light btn-sm" id="logout-btn">Logout</button>
        </div>
      </nav>

      <main class="container py-4">
        <section class="card card-soft p-4 mb-4">
          <h3 class="fw-bold mb-3">Add New Student</h3>
          <form id="student-form" class="row g-3">
            <div class="col-md-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" id="student-name" required />
            </div>
            <div class="col-md-3">
              <label class="form-label">Mobile</label>
              <input type="text" class="form-control" id="student-mobile" required />
            </div>
            <div class="col-md-3">
              <label class="form-label">Admission Date</label>
              <input type="date" class="form-control" id="student-admission-date" required />
            </div>
            <div class="col-md-3">
              <label class="form-label">Initial Fee Status</label>
              <select class="form-select" id="student-fee-status">
                <option value="Paid">Paid</option>
                <option value="Unpaid">Unpaid</option>
              </select>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">Save Student</button>
            </div>
          </form>
        </section>

        <section class="card card-soft p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h3 class="fw-bold mb-0">Students</h3>
            <span class="badge bg-info text-dark" id="student-count">0</span>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>Name</th>
                  <th>Mobile</th>
                  <th>Admission Date</th>
                  <th>Fee Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="student-table-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const STORAGE_KEY = 'parthLibraryStudents';
      const PASSCODE = 'parth2026';

      function getStudents() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return [];
        try {
          const parsed = JSON.parse(stored);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          console.error('Failed to parse student data', error);
          return [];
        }
      }

      function saveStudents(students) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(students));
      }

      function initializeMockData() {
        const existing = getStudents();
        if (existing.length > 0) return existing;

        const students = [
          {
            id: `STU-${Date.now()}-1`,
            name: 'Aarav Sharma',
            mobile: '9876543210',
            admissionDate: '2024-01-15',
            feeStatus: 'Paid',
            lastPaymentDate: new Date().toISOString()
          },
          {
            id: `STU-${Date.now()}-2`,
            name: 'Meera Patel',
            mobile: '9123456780',
            admissionDate: '2024-02-20',
            feeStatus: 'Unpaid',
            lastPaymentDate: new Date(Date.now() - 40 * 24 * 60 * 60 * 1000).toISOString()
          }
        ];

        saveStudents(students);
        return students;
      }

      function renderStudents() {
        const students = initializeMockData();
        const tableBody = document.getElementById('student-table-body');
        const studentCount = document.getElementById('student-count');

        if (!tableBody) return;

        tableBody.innerHTML = '';
        studentCount.textContent = students.length;

        if (students.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No students found.</td></tr>';
          return;
        }

        students.forEach((student) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${student.name}</td>
            <td>${student.mobile}</td>
            <td>${student.admissionDate}</td>
            <td>
              <span class="badge ${student.feeStatus === 'Paid' ? 'bg-success' : 'bg-danger'}">
                ${student.feeStatus}
              </span>
            </td>
            <td>
              <button class="btn btn-sm ${student.feeStatus === 'Paid' ? 'btn-outline-secondary' : 'btn-success'}" data-id="${student.id}">
                ${student.feeStatus === 'Paid' ? 'Mark Unpaid' : 'Mark Paid'}
              </button>
            </td>
          `;
          tableBody.appendChild(row);
        });
      }

      function addStudent(event) {
        event.preventDefault();
        const students = initializeMockData();
        const name = document.getElementById('student-name').value.trim();
        const mobile = document.getElementById('student-mobile').value.trim();
        const admissionDate = document.getElementById('student-admission-date').value;
        const feeStatus = document.getElementById('student-fee-status').value;

        if (!name || !mobile || !admissionDate) return;

        const newStudent = {
          id: `STU-${Date.now()}`,
          name,
          mobile,
          admissionDate,
          feeStatus,
          lastPaymentDate: feeStatus === 'Paid' ? new Date().toISOString() : new Date(Date.now() - 5 * 24 * 60 * 60 * 1000).toISOString()
        };

        students.push(newStudent);
        saveStudents(students);
        document.getElementById('student-form').reset();
        renderStudents();
      }

      function toggleFeeStatus(studentId) {
        const students = initializeMockData();
        const student = students.find((entry) => entry.id === studentId);
        if (!student) return;

        student.feeStatus = student.feeStatus === 'Paid' ? 'Unpaid' : 'Paid';
        student.lastPaymentDate = new Date().toISOString();
        saveStudents(students);
        renderStudents();
      }

      function showDashboard() {
        document.getElementById('login-view').classList.add('d-none');
        document.getElementById('dashboard-view').classList.remove('d-none');
        renderStudents();
      }

      function showLogin() {
        document.getElementById('dashboard-view').classList.add('d-none');
        document.getElementById('login-view').classList.remove('d-none');
      }

      document.getElementById('login-form').addEventListener('submit', (event) => {
        event.preventDefault();
        const entered = document.getElementById('passcode').value;
        const error = document.getElementById('login-error');

        if (entered === PASSCODE) {
          error.classList.add('d-none');
          showDashboard();
        } else {
          error.classList.remove('d-none');
        }
      });

      document.getElementById('logout-btn').addEventListener('click', () => {
        document.getElementById('passcode').value = '';
        showLogin();
      });

      document.getElementById('student-form').addEventListener('submit', addStudent);

      document.addEventListener('click', (event) => {
        const button = event.target.closest('button[data-id]');
        if (button) {
          toggleFeeStatus(button.getAttribute('data-id'));
        }
      });

      document.addEventListener('DOMContentLoaded', () => {
        initializeMockData();
        showLogin();
      });
    </script>
  </body>
</html>
