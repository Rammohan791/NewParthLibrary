<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parth Library Student Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
      }

      .card-soft {
        border: 0;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary shadow-sm">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
          <i class="fa-solid fa-book-open me-2"></i>Parth Library
        </a>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-light btn-sm" href="index.html">Home</a>
          <a class="btn btn-outline-light btn-sm" href="admin.html">Admin Dashboard</a>
        </div>
      </div>
    </nav>

    <div class="min-vh-100 d-flex align-items-center justify-content-center p-4">
      <div class="card card-soft p-4 w-100" style="max-width: 520px;">
        <div class="text-center mb-4">
          <h2 class="fw-bold">Student Portal</h2>
          <p class="text-muted mb-0">Enter your registered mobile number to view your profile.</p>
        </div>

        <form id="student-login-form" class="mb-3">
          <label for="student-mobile" class="form-label">Mobile Number</label>
          <input type="text" id="student-mobile" class="form-control" placeholder="Enter registered mobile" required />
          <button type="submit" class="btn btn-primary w-100 mt-3">View Profile</button>
        </form>

        <div id="student-alert" class="alert d-none" role="alert"></div>

        <div id="student-profile" class="d-none">
          <div class="card border-0 bg-light">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold mb-0" id="student-name"></h4>
                <span class="badge bg-primary-subtle text-primary-emphasis">Student Profile</span>
              </div>

              <p class="mb-2"><strong>Admission Date:</strong> <span id="admission-date"></span></p>
              <div id="fee-status-box" class="p-3 rounded-3 fw-bold mb-3"></div>
              <div id="fee-warning" class="alert d-none" role="alert"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const STORAGE_KEY = 'parthLibraryStudents';

      function getStudents() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return [];
        try {
          const parsed = JSON.parse(stored);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          console.error('Failed to parse student data', error);
          return [];
        }
      }

      function showProfile(student) {
        document.getElementById('student-profile').classList.remove('d-none');
        document.getElementById('student-name').textContent = student.name;
        document.getElementById('admission-date').textContent = student.admissionDate;

        const feeStatusBox = document.getElementById('fee-status-box');
        feeStatusBox.className = `p-3 rounded-3 fw-bold mb-3 ${student.feeStatus === 'Paid' ? 'bg-success text-white' : 'bg-danger text-white'}`;
        feeStatusBox.textContent = `CURRENT FEE STATUS: ${student.feeStatus.toUpperCase()}`;

        const warningBox = document.getElementById('fee-warning');
        const lastPaymentDate = new Date(student.lastPaymentDate);
        const now = new Date();
        const daysPassed = (now - lastPaymentDate) / (1000 * 60 * 60 * 24);

        if (student.feeStatus === 'Paid' && daysPassed >= 30) {
          warningBox.className = 'alert alert-warning';
          warningBox.textContent = 'Your fee payment window has expired. Please pay your fees to continue using the library services.';
          warningBox.classList.remove('d-none');
        } else if (student.feeStatus === 'Unpaid') {
          warningBox.className = 'alert alert-danger';
          warningBox.textContent = 'Please pay your fee to avoid service restrictions.';
          warningBox.classList.remove('d-none');
        } else {
          warningBox.className = 'alert d-none';
          warningBox.textContent = '';
          warningBox.classList.add('d-none');
        }
      }

      document.getElementById('student-login-form').addEventListener('submit', function (event) {
        event.preventDefault();
        const enteredMobile = document.getElementById('student-mobile').value.trim();
        const alertBox = document.getElementById('student-alert');
        const students = getStudents();
        const student = students.find((entry) => entry.mobile === enteredMobile);

        if (!student) {
          alertBox.className = 'alert alert-danger';
          alertBox.textContent = 'No student profile found for this mobile number.';
          alertBox.classList.remove('d-none');
          document.getElementById('student-profile').classList.add('d-none');
          return;
        }

        alertBox.className = 'alert alert-success d-none';
        alertBox.textContent = '';
        showProfile(student);
      });
    </script>
  </body>
</html>
